        background: rgba(255, 209, 102, 0.22);

        height: 20px;

        cursor: grabbing;
      }

      .timeline-slider::-webkit-slider-runnable-track {
        height: 56px;
        background: transparent;

        appearance: none;
        width: 48px;
        height: 48px;
        border: 0;
        border-radius: 50%;
        background: #ffffff;
      }

      .timeline-slider::-moz-range-track {
        height: 56px;
        background: transparent;
        border: 0;
      }

      .timeline-slider::-moz-range-thumb {
        width: 48px;
        height: 48px;
        border: 0;
        border-radius: 50%;
        background: #ffffff;

            data-src="project_time/policy-evaluation.html?v=20260610-policy-copy-cleanup"
            hidden
          ></iframe>
          <iframe
            class="page-frame"
            id="page-comparison"
            title="国内与全球结果对照"
            role="tabpanel"
            aria-labelledby="tab-comparison"
            data-src="project_chart/bar-chart-race.html?v=20260610-shell-root"
            hidden
          ></iframe>
        </main>
    </div>

    <script>
      const opening = document.querySelector("#opening");
            const canvas = document.querySelector("#dustCanvas");
            const ctx = canvas.getContext("2d", { alpha: true });
            const introTypewriter = document.querySelector("#introTypewriter");
            const introLineOne = document.querySelector("#introLineOne");
            const introLineTwo = document.querySelector("#introLineTwo");
            const policySlider = document.querySelector("#policySlider");
            const policyYear = document.querySelector("#policyYear");
            const policyTitle = document.querySelector("#policyTitle");
            const policySubtitle = document.querySelector("#policySubtitle");
            const policyMarkers = document.querySelector("#policyMarkers");
            const timelineProgress = document.querySelector("#timelineProgress");
            const timelineThumb = document.querySelector("#timelineThumb");
            const openingStart = document.querySelector("#openingStart");
            const dpr = Math.min(window.devicePixelRatio || 1, 2);
            const startYear = 2011;
            const endYear = 2026;
            const policies = [
              { date: "2011-07-01", title: "北京市清洁空气行动计划（2011-2015 年大气污染控制措施）" },
              { date: "2012-08-01", title: "北京市工业大气污染治理行动计划（2012-2020 年）" },
              { date: "2012-09-01", title: "加快压减燃煤促进空气质量改善工作方案" },
              { date: "2012-09-01", title: "北京市2012—2020年大气污染治理措施" },
              { date: "2013-09-01", title: "北京市 2013-2017 年清洁空气行动计划" },
              { date: "2013-09-01", title: "京津冀及周边地区落实大气污染防治行动计划实施细则" },
              { date: "2018-09-01", title: "北京市打赢蓝天保卫战三年行动计划" },
              { date: "2021-12-01", title: "北京市“十四五”时期生态环境保护规划" },
              { date: "2022-02-01", title: "北京市深入打好污染防治攻坚战 2022 年行动计划" },
              { date: "2023-02-01", title: "北京市深入打好污染防治攻坚战 2023 年行动计划" },
              { date: "2024-02-01", title: "推进美丽北京建设 持续深入打好污染防治攻坚战 2024 年行动计划" },
              { date: "2025-01-01", title: "推进美丽北京建设 持续深入打好污染防治攻坚战 2025 年行动计划" },
              { date: "2026-01-01", title: "美丽北京建设2026年行动计划" }
            ].map((policy) => ({ ...policy, value: decimalYear(policy.date) }));
      
            const pointer = { x: -9999, y: -9999, px: -9999, py: -9999, vx: 0, vy: 0, active: false };
            let particles = [];
            let w = 0;
            let h = 0;
            let targetClear = 0;
            let currentClear = 0;
            let completed = false;
            let timelineReady = false;
            let completionScrollTimer = null;
            let timelineAutoplayFrame = null;
            let timelineAutoplayLastTime = null;
            let timelineAutoplayPaused = false;
            let timelineAutoplayElapsed = 0;
            const timelineAutoplayDuration = 5000;
      
            function decimalYear(dateText) {
              const [year, month, day] = dateText.split("-").map(Number);
              return year + (month - 1) / 12 + (day - 1) / 365;
            }
      
            function progressFromYear(value) {
              return Math.min(1, Math.max(0, (value - startYear) / (endYear - startYear)));
            }
      
            function nearestPolicyIndex(value) {
              let nearest = 0;
              let nearestDistance = Infinity;
              policies.forEach((policy, index) => {
                const distance = Math.abs(policy.value - value);
                if (distance < nearestDistance) {
                  nearest = index;
                  nearestDistance = distance;
                }
              });
              return nearest;
            }
      
            function resizeCanvas() {
              const rect = opening.getBoundingClientRect();
              w = Math.max(1, Math.round(rect.width));
              h = Math.max(1, Math.round(rect.height));
              canvas.width = Math.round(w * dpr);
              canvas.height = Math.round(h * dpr);
              canvas.style.width = `${w}px`;
              canvas.style.height = `${h}px`;
              ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
              createParticles();
            }
      
            function createParticles() {
              const area = w * h;
              const count = Math.min(6000, Math.max(2400, Math.floor(area / 160)));
              particles = Array.from({ length: count }, () => {
                const yBias = Math.random();
                return {
                  x: Math.random() * w,
                  y: Math.pow(yBias, 0.82) * h,
                  vx: (Math.random() - 0.5) * 0.38,
                  vy: -0.12 - Math.random() * 0.34,
                  r: 0.7 + Math.random() * 2.4,
                  a: 0.24 + Math.random() * 0.54,
                  warm: Math.random() < 0.16,
                  lightness: 34 + Math.random() * 18,
                  fadeOrder: Math.random()
                };
              });
            }
      
            function renderMarkers() {
              let lastLabelProgress = -Infinity;
              policyMarkers.replaceChildren(...policies.map((policy, index) => {
                const markerProgress = progressFromYear(policy.value);
                const marker = document.createElement("button");
                marker.type = "button";
                marker.className = "policy-marker";
                marker.tabIndex = -1;
                marker.dataset.index = index;
                marker.style.left = `${markerProgress * 100}%`;
                marker.title = `${policy.date} ${policy.title}`;
                if (markerProgress - lastLabelProgress >= 0.04) {
                  const label = document.createElement("span");
                  label.className = "marker-date";
                  label.textContent = policy.date.slice(0, 4);
                  marker.append(label);
                  lastLabelProgress = markerProgress;
                }
                return marker;
              }));
            }
      
            function renderPolicyTitle(title) {
              policyTitle.classList.toggle("is-long", title.length > 24 && title.length <= 34);
              policyTitle.classList.toggle("is-extra-long", title.length > 34);
              policyTitle.textContent = title;
            }
      
            function renderPolicyState(index, progress) {
              const policy = policies[index];
              targetClear = progress;
              timelineProgress.style.width = `${progress * 100}%`;
              timelineThumb.style.left = `${progress * 100}%`;
              document.querySelectorAll(".policy-marker").forEach((marker, markerIndex) => {
                marker.classList.toggle("is-active", markerIndex <= index);
              });
              policyYear.textContent = policy.date.slice(0, 4);
              renderPolicyTitle(policy.title);
              policySubtitle.textContent = `北京市累计颁布 ${index + 1} 项+政策`;
            }
      
            function updateTimeline() {
              if (!timelineReady) return;
              if (completed) {
                if (completionScrollTimer) {
                  clearTimeout(completionScrollTimer);
                  completionScrollTimer = null;
                }
                const index = nearestPolicyIndex(Number(policySlider.value));
                const policy = policies[index];
                policySlider.value = policy.value;
                renderPolicyState(index, progressFromYear(policy.value));
                opening.scrollIntoView({ behavior: "smooth", block: "start" });
              }
            }
      
            function startTimelineAutoplay() {
              if (!timelineReady || completed) return;
              if (timelineAutoplayFrame) cancelAnimationFrame(timelineAutoplayFrame);
              opening.classList.add("is-autoplay-started");
              policySlider.disabled = true;
              timelineAutoplayElapsed = 0;
              timelineAutoplayLastTime = null;
              timelineAutoplayPaused = false;
              timelineAutoplayFrame = requestAnimationFrame(stepTimelineAutoplay);
            }
      
            function stepTimelineAutoplay(timestamp) {
              if (!timelineReady || completed) {
                timelineAutoplayFrame = null;
                return;
              }
              if (timelineAutoplayPaused) {
                timelineAutoplayLastTime = timestamp;
                timelineAutoplayFrame = requestAnimationFrame(stepTimelineAutoplay);
                return;
              }
              if (timelineAutoplayLastTime === null) {
                timelineAutoplayLastTime = timestamp;
              }
              const elapsed = timestamp - timelineAutoplayLastTime;
              timelineAutoplayLastTime = timestamp;
              timelineAutoplayElapsed = Math.min(timelineAutoplayDuration, timelineAutoplayElapsed + elapsed);
              const progress = timelineAutoplayElapsed / timelineAutoplayDuration;
              const index = Math.min(policies.length - 1, Math.floor(progress * policies.length));
              policySlider.value = (startYear + progress * (endYear - startYear)).toFixed(2);
              renderPolicyState(index, progress);
              if (timelineAutoplayElapsed >= timelineAutoplayDuration) {
                finishTimelinePlayback();
                return;
              }
              timelineAutoplayFrame = requestAnimationFrame(stepTimelineAutoplay);
            }
      
            function finishTimelinePlayback() {
              timelineAutoplayFrame = null;
              completed = true;
              policySlider.disabled = false;
              policySlider.value = endYear;
              opening.classList.add("is-complete");
              document.querySelectorAll(".policy-marker").forEach((marker) => {
                marker.tabIndex = 0;
              });
              targetClear = 1;
              timelineProgress.style.width = "100%";
              timelineThumb.style.left = "100%";
              policyYear.textContent = "2026";
              renderPolicyTitle("走进北京空气质量与政策治理");
              policySubtitle.textContent = "";
              completionScrollTimer = setTimeout(() => {
                document.querySelector("#analysis-pages").scrollIntoView({ behavior: "smooth", block: "start" });
                completionScrollTimer = null;
              }, 1100);
            }
      
            function pauseTimelineAutoplay() {
              timelineAutoplayPaused = true;
            }
      
            function resumeTimelineAutoplay() {
              if (completed) return;
              timelineAutoplayLastTime = null;
              timelineAutoplayPaused = false;
            }
      
            function typeRichLine(element, segments, options = {}) {
              return new Promise((resolve) => {
                introTypewriter.classList.remove("is-hidden");
                element.replaceChildren();
                element.classList.add("is-typing");
                const typingCursor = document.createElement("span");
                typingCursor.className = "typing-cursor";
                const letters = [];
                for (const segment of segments) {
                  const wrapper = document.createElement("span");
                  if (segment.emphasis) wrapper.className = "text-emphasis";
                  for (const char of Array.from(segment.text)) {
                    const letter = document.createElement("span");
                    letter.textContent = char;
                    letter.style.visibility = "hidden";
                    wrapper.append(letter);
                    letters.push(letter);
                  }
                  element.append(wrapper);
                }
                let cursor = -1;
                const timer = setInterval(() => {
                  cursor += 1;
                  if (letters[cursor]) {
                    letters[cursor].style.visibility = "visible";
                    letters[cursor].after(typingCursor);
                  }
                  if (cursor >= letters.length - 1) {
                    clearInterval(timer);
                    element.classList.remove("is-typing");
                    typingCursor.remove();
                    setTimeout(resolve, options.holdAfter ?? 950);
                  }
                }, 74);
              });
            }
      
            function hideIntroLine() {
              return new Promise((resolve) => {
                introTypewriter.classList.add("is-hidden");
                setTimeout(resolve, 760);
              });
            }
      
            async function playOpeningText() {
              policySlider.disabled = true;
              await typeRichLine(introLineOne, [
                { text: "2013年北京平均" },
                { text: "每周", emphasis: true },
                { text: "都会有一天重污染" }
              ]);
              await typeRichLine(introLineTwo, [
                { text: "2026年第一季度北京市重污染天数为" },
                { text: "零", emphasis: true }
              ], { holdAfter: 1200 });
              await hideIntroLine();
              timelineReady = true;
              policySlider.disabled = true;
              opening.classList.add("is-timeline-ready");
            }
      
            function setVisualClear(clear) {
              opening.style.setProperty("--clear", clear.toFixed(3));
              opening.style.setProperty("--shade-top", (0.9 - clear * 0.5).toFixed(3));
              opening.style.setProperty("--shade-mid", (0.78 - clear * 0.52).toFixed(3));
              opening.style.setProperty("--shade-sky", (0.2 + clear * 0.36).toFixed(3));
              opening.style.setProperty("--bg-opacity", Math.min(0.92, 0.04 + Math.max(0, clear - 0.08) * 1.08).toFixed(3));
              opening.style.setProperty("--bg-blur", `${((1 - clear) * 10).toFixed(2)}px`);
              opening.style.setProperty("--bg-saturate", (0.78 + clear * 0.55).toFixed(3));
              opening.style.setProperty("--bg-scale", (1.035 - clear * 0.035).toFixed(4));
              opening.style.setProperty("--photo-opacity", Math.min(0.96, Math.max(0, clear - 0.12) * 1.16).toFixed(3));
              opening.style.setProperty("--photo-blur", `${Math.max(0, (1 - clear) * 8).toFixed(2)}px`);
              opening.style.setProperty("--map-opacity", "0");
              opening.style.setProperty("--sky-opacity", Math.max(0, 0.28 - clear * 0.22).toFixed(3));
              opening.style.setProperty("--skyline-opacity", "0");
            }
      
            function addHole(event) {
              const rect = canvas.getBoundingClientRect();
              const x = event.clientX - rect.left;
              const y = event.clientY - rect.top;
              pointer.vx = x - pointer.px;
              pointer.vy = y - pointer.py;
              pointer.px = x;
              pointer.py = y;
              pointer.x = x;
              pointer.y = y;
              pointer.active = true;
            }
      
            function updateParticles(clear) {
              for (const p of particles) {
                const wind = 0.28 + clear * 1.2;
                p.x += p.vx + wind;
                p.y += p.vy + Math.sin((p.x + p.y) * 0.01) * 0.18;
                const dx = p.x - pointer.x;
                const dy = p.y - pointer.y;
                const dist = Math.hypot(dx, dy);
                if (pointer.active && dist < 92) {
                  const force = (1 - dist / 92) * 1.75;
                  p.x += (dx / (dist || 1)) * force + pointer.vx * 0.022;
                  p.y += (dy / (dist || 1)) * force + pointer.vy * 0.022;
                }
                if (p.x > w + 30) p.x = -30;
                if (p.y < -30) p.y = h + 30;
                if (p.y > h + 30) p.y = -30;
              }
            }
      
            function drawDust(clear) {
              ctx.clearRect(0, 0, w, h);
              const hazeAlpha = 0.86 * Math.pow(1 - clear, 2);
              const gradient = ctx.createLinearGradient(0, 0, w, h);
              gradient.addColorStop(0, `rgba(54, 42, 30, ${hazeAlpha})`);
              gradient.addColorStop(0.46, `rgba(138, 106, 61, ${hazeAlpha * 0.86})`);
              gradient.addColorStop(1, `rgba(194, 160, 96, ${hazeAlpha * 0.62})`);
              ctx.fillStyle = gradient;
              ctx.fillRect(0, 0, w, h);
              ctx.save();
              ctx.globalCompositeOperation = "source-over";
              const visibleDensity = Math.max(0.08, Math.pow(1 - clear, 1.25));
              for (const p of particles) {
                if (p.fadeOrder > visibleDensity) continue;
                ctx.beginPath();
                const hue = p.warm ? 42 : 210;
                const saturation = p.warm ? 34 : 6;
                const lightness = p.warm ? p.lightness + 18 : p.lightness;
                ctx.fillStyle = `hsla(${hue}, ${saturation}%, ${lightness}%, ${p.a * Math.max(0.025, Math.pow(1 - clear, 0.75))})`;
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fill();
              }
              ctx.restore();
            }
      
            function animate() {
              currentClear += (targetClear - currentClear) * 0.08;
              setVisualClear(currentClear);
              updateParticles(currentClear);
              drawDust(currentClear);
              requestAnimationFrame(animate);
            }
      
            canvas.addEventListener("pointermove", addHole);
            canvas.addEventListener("pointerleave", () => {
              pointer.active = false;
              pointer.x = -9999;
              pointer.y = -9999;
            });
            policySlider.addEventListener("input", updateTimeline);
            policySlider.addEventListener("pointerdown", pauseTimelineAutoplay);
            window.addEventListener("pointerup", resumeTimelineAutoplay);
            openingStart.addEventListener("click", startTimelineAutoplay);
            policyMarkers.addEventListener("click", (event) => {
              const marker = event.target.closest(".policy-marker");
              if (!marker || !completed) return;
              if (completionScrollTimer) {
                clearTimeout(completionScrollTimer);
                completionScrollTimer = null;
              }
              const policy = policies[Number(marker.dataset.index)];
              policySlider.value = policy.value;
              updateTimeline();
              opening.scrollIntoView({ behavior: "smooth", block: "start" });
            });
            window.addEventListener("resize", resizeCanvas);
            renderMarkers();
            resizeCanvas();
            setVisualClear(0);
            playOpeningText();
            requestAnimationFrame(animate);
    </script>

    <script>
      (() => {
            const tabs = Array.from(document.querySelectorAll(".nav-tab"));
            const tabLabels = {
              cn: {
                overview: "北京市空气质量概览",
                measures: "政策措施分析",
                policy: "政策效果评估",
                comparison: "国内与全球结果对照"
              },
              en: {
                overview: "Beijing Air Quality Overview",
                measures: "Policy Measure Analysis",
                policy: "Beijing Policy Effectiveness",
                comparison: "Domestic and Global Comparison"
              }
            };
            const brandLabels = {
              cn: "北京市空气质量与政策可视化",
              en: "Beijing Air Quality and Policy Visualization"
            };
            const frames = {
              overview: document.getElementById("page-overview"),
              measures: document.getElementById("page-measures"),
              policy: document.getElementById("page-policy"),
              comparison: document.getElementById("page-comparison")
            };
      
            function activatePage(page, updateHistory = true) {
              const activePage = frames[page] ? page : "overview";
      
              tabs.forEach((tab) => {
                const isActive = tab.dataset.page === activePage;
                tab.setAttribute("aria-selected", String(isActive));
                tab.tabIndex = isActive ? 0 : -1;
              });
      
              Object.entries(frames).forEach(([name, frame]) => {
                frame.hidden = name !== activePage;
              });
      
              const activeFrame = frames[activePage];
              if (!activeFrame.getAttribute("src") && activeFrame.dataset.src) {
                activeFrame.src = activeFrame.dataset.src;
              }
      
              if (updateHistory) {
                history.replaceState(null, "", `#${activePage}`);
              }
            }
      
            function updateShellLanguage(language) {
              const lang = language === "en" ? "en" : "cn";
              document.documentElement.lang = lang === "en" ? "en" : "zh-CN";
              document.title = lang === "en"
                ? "Beijing Air Quality Analysis"
                : "北京市空气质量分析";
              document.getElementById("siteBrand").textContent = brandLabels[lang];
              tabs.forEach((tab) => {
                tab.textContent = tabLabels[lang][tab.dataset.page];
              });
            }
      
            tabs.forEach((tab, index) => {
              tab.addEventListener("click", () => activatePage(tab.dataset.page));
              tab.addEventListener("keydown", (event) => {
                if (event.key !== "ArrowLeft" && event.key !== "ArrowRight") {
                  return;
                }
                const offset = event.key === "ArrowRight" ? 1 : -1;
                const nextTab = tabs[(index + offset + tabs.length) % tabs.length];
                nextTab.focus();
                activatePage(nextTab.dataset.page);
              });
            });
      
            window.addEventListener("hashchange", () => {
              activatePage(location.hash.slice(1), false);
            });
      
            window.addEventListener("message", (event) => {
              if (event.data?.type === "page-language-change") {
                updateShellLanguage(event.data.language);
              }
            });
      
            updateShellLanguage("cn");
            activatePage(location.hash.slice(1), false);
          })();
    </script>
  </body>
</html>
