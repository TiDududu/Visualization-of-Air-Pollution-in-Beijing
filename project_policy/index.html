<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>政策措施分析</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="policy-measure-charts.css">
  <style>
    :root {
      --ink: #17222d;
      --muted: #64717d;
      --paper: #f3f5f8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: "Noto Sans SC", "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    }

    .page-shell {
      width: min(1540px, calc(100% - 40px));
      margin: 0 auto;
      padding: 32px 0 72px;
    }

    .hero {
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 10px;
      color: #172033;
      font-size: clamp(30px, 3vw, 38px);
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .hero-copy {
      max-width: 820px;
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .site-footer {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-top: 34px;
      color: #8b949c;
      font-size: 12px;
    }

    @media (max-width: 760px) {
      .page-shell {
        width: min(100vw - 24px, 760px);
        padding: 22px 0 44px;
      }

      .site-footer {
        display: block;
      }

      .site-footer .right {
        margin-top: 6px;
      }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <section
      data-policy-measure-charts
      data-policy-measure-page-title="政策措施分析"
      aria-label="北京市政策治理措施词云与桑基图"
    ></section>

    <footer class="site-footer">
      <div class="left">清华大学 · 数据可视化课程</div>
      <div class="right">DATA · AQICN / 北京市环境保护监测中心 / CPCB / MEE / AQLI</div>
    </footer>
  </main>

  <script src="d3.v7.min.js"></script>
  <script src="policy-measure-wordcloud-data.js"></script>
  <script src="policy-measure-charts.js"></script>
</body>
</html>
