<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>空气污染治理政策动态可视化</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">2010-2026 北京空气污染治理政策</p>
        <h1>空气污染治理政策动态可视化</h1>
      </div>
      <div class="status" id="status">正在读取政策数据...</div>
    </header>

    <section class="timeline-section" aria-label="政策时间图">
      <div class="section-title">
        <h2>政策时间图</h2>
        <span>按发布年份排列，点击封面或名称查看详情</span>
      </div>
      <div class="timeline-scroll" id="timelineScroll">
        <svg id="timelineSvg" role="img" aria-label="政策发布时间轴"></svg>
      </div>
    </section>

    <section class="detail-grid">
      <section class="pollutant-section" aria-label="污染物词云图">
        <div class="section-title">
          <h2>涉及污染物</h2>
          <span>圆面积代表出现次数</span>
        </div>
        <svg id="cloudSvg" role="img" aria-label="污染物圆形词云"></svg>
      </section>

      <aside class="policy-panel" id="policyPanel" aria-live="polite">
        <div class="panel-placeholder">
          <p>正在准备政策信息...</p>
        </div>
      </aside>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="app.js" defer></script>
</body>
</html>
