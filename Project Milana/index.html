<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>2014-2026年北京市空气质量概览</title>

<script src="../project_policy/d3.v7.min.js"></script>

<style>
    :root {
        --bg: #f3f5f8;
        --panel: #ffffff;
        --ink: #172033;
        --muted: #697386;
        --rule: #dfe4eb;
        --accent: #2563eb;
        --accent-soft: #eaf1ff;
    }

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        color: var(--ink);
        background: var(--bg);
        font-family: "Noto Sans SC", "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    }

    button,
    input {
        font: inherit;
    }

    .page {
        width: min(1540px, calc(100% - 40px));
        margin: 0 auto;
        padding: 32px 0 40px;
    }

    h1 {
        margin: 0 0 10px;
        color: #172033;
        font-family: "Noto Sans SC", "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
        font-size: clamp(30px, 3vw, 38px);
        font-weight: 800;
        line-height: 1.15;
        letter-spacing: -0.025em;
    }

    .overview-hero-stats {
        width: min(880px, 100%);
        margin: 0 auto 26px;
        padding: 10px 0 22px;
        text-align: center;
    }

    .overview-hero-pct {
        color: #c94435;
        font-family: "Noto Sans SC", "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
        font-size: clamp(90px, 13vw, 190px);
        font-weight: 800;
        line-height: 0.9;
        letter-spacing: -0.045em;
    }

    .overview-hero-change {
        margin-top: 6px;
        color: #18181b;
        font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
        font-size: clamp(28px, 4vw, 44px);
        font-weight: 500;
        letter-spacing: 0.02em;
    }

    .overview-hero-arrow {
        margin: 0 22px;
        color: var(--muted);
        font-weight: 400;
    }

    .overview-hero-caption {
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.04em;
    }

    .overview-hero-value-unit {
        margin-left: 5px;
        color: var(--muted);
        font-size: 0.34em;
        font-weight: 700;
        letter-spacing: 0;
        vertical-align: 0.28em;
    }

    .overview-hero-impact {
        max-width: 940px;
        margin: 30px auto 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.9;
        text-align: center;
    }

    .overview-hero-impact b {
        color: #18181b;
        font-weight: 800;
    }

    .overview-hero-impact abbr[title] {
        cursor: help;
        text-decoration: underline dotted;
        text-decoration-thickness: 1px;
        text-underline-offset: 3px;
    }

    .controls {
        display: flex;
        align-items: center;
        gap: 28px;
        margin-bottom: 18px;
        padding: 14px 18px;
        background: var(--panel);
        border: 1px solid var(--rule);
        border-radius: 10px;
        box-shadow: 0 4px 18px rgba(23, 32, 51, 0.04);
    }

    .control-group {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .control-title {
        flex: 0 0 auto;
        color: #30394b;
        font-size: 14px;
        font-weight: 700;
    }

    .checkboxes {
        display: flex;
        flex-wrap: wrap;
        gap: 9px 12px;
    }

    .checkboxes label {
        color: #3d4658;
        cursor: pointer;
        font-size: 13px;
        user-select: none;
    }

    .year-control {
        margin-left: auto;
    }

    #yearSlider {
        width: min(280px, 24vw);
    }

    #yearLabel {
        min-width: 76px;
        color: var(--accent);
        font-size: 14px;
        font-weight: 700;
    }

    .dashboard {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 350px;
        gap: 18px;
        align-items: start;
    }

    .dashboard.full-view {
        grid-template-columns: minmax(0, 1fr);
    }

    .dashboard.full-view .policy-info {
        display: none;
    }

    .visualization-panel,
    .policy-info {
        background: var(--panel);
        border: 1px solid var(--rule);
        border-radius: 10px;
        box-shadow: 0 5px 22px rgba(23, 32, 51, 0.045);
    }

    .visualization-panel {
        min-width: 0;
        overflow: hidden;
    }

    .chart-scroll {
        width: 100%;
        overflow-x: auto;
        overflow-y: hidden;
        scrollbar-color: #aeb8c8 #edf0f4;
        scrollbar-width: thin;
    }

    .chart-scroll::-webkit-scrollbar {
        height: 12px;
    }

    .chart-scroll::-webkit-scrollbar-track {
        background: #edf0f4;
    }

    .chart-scroll::-webkit-scrollbar-thumb {
        background: #aeb8c8;
        border: 3px solid #edf0f4;
        border-radius: 999px;
    }

    .chart-legend {
        display: flex;
        align-items: center;
        gap: 44px;
        min-height: 58px;
        padding: 0 28px;
        overflow-x: auto;
        background: #fff;
        border-top: 1px solid var(--rule);
    }

    .chart-legend-item {
        display: inline-flex;
        flex: 0 0 auto;
        align-items: center;
        gap: 8px;
        color: #3c4557;
        font-size: 13px;
    }

    .chart-legend-swatch {
        width: 14px;
        height: 14px;
    }

    .chart-canvas {
        position: relative;
        min-width: 960px;
    }

    .dashboard.full-view .chart-scroll {
        overflow-x: hidden;
    }

    .dashboard.full-view .chart-canvas {
        min-width: 0;
    }

    .policy-timeline {
        position: relative;
        height: 132px;
        border-bottom: 1px solid #edf0f4;
        background:
            linear-gradient(180deg, #fbfcfe 0%, #fff 100%);
        overflow: hidden;
    }

    .policy-axis-line {
        position: absolute;
        top: 78px;
        height: 2px;
        background: #9ba6b6;
    }

    .policy-axis-title {
        position: absolute;
        top: 12px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.04em;
    }

    .policy-duration {
        position: absolute;
        top: 74px;
        height: 10px;
        min-width: 3px;
        border: 2px solid #fff;
        border-radius: 999px;
        opacity: 0.9;
    }

    .policy-axis-tick {
        position: absolute;
        top: 77px;
        width: 1px;
        height: 7px;
        background: #7f8a9c;
    }

    .policy-axis-tick-label {
        position: absolute;
        top: 88px;
        color: var(--muted);
        font-size: 10px;
        transform: translateX(-50%);
    }

    .policy-marker {
        position: absolute;
        top: 69px;
        z-index: 3;
        width: 18px;
        height: 18px;
        padding: 0;
        color: inherit;
        text-align: left;
        background: transparent;
        border: 0;
        cursor: pointer;
        transform: translateX(-50%);
    }

    .policy-marker::before {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        width: 14px;
        height: 14px;
        background: #8b1e24;
        border: 2px solid #fff;
        border-radius: 50%;
        box-shadow: 0 3px 10px rgba(139, 30, 36, 0.24);
        transform: translate(-50%, -50%) scale(1);
        transform-origin: center;
        transition: background 140ms ease, box-shadow 140ms ease, transform 140ms ease;
    }

    .policy-marker::after {
        content: none;
    }

    .policy-marker:hover,
    .policy-marker:focus-visible,
    .policy-marker.active {
        z-index: 4;
        outline: none;
    }

    .policy-marker:hover::before,
    .policy-marker:focus-visible::before,
    .policy-marker.active::before {
        box-shadow: 0 5px 18px rgba(139, 30, 36, 0.34);
        transform: translate(-50%, -50%) scale(1.24);
    }

    .policy-marker.active::before {
        background: #5f1117;
    }

    .policy-cover {
        display: none;
        float: left;
        width: 50px;
        height: 66px;
        margin-right: 9px;
        object-fit: cover;
        object-position: top;
        background: #edf0f4;
        border: 1px solid #d9dee6;
        border-radius: 3px;
    }

    .policy-marker-name {
        position: absolute;
        bottom: 28px;
        left: 50%;
        display: block;
        width: var(--label-width, 260px);
        max-width: calc(100vw - 40px);
        padding: 8px 10px;
        opacity: 0;
        visibility: hidden;
        color: #253047;
        background: rgba(255, 255, 255, 0.98);
        border: 1px solid #d9dee6;
        border-radius: 6px;
        box-shadow: 0 8px 22px rgba(23, 32, 51, 0.16);
        font-size: 12px;
        font-weight: 700;
        line-height: 1.45;
        text-align: center;
        white-space: normal;
        transform: translate(calc(-50% + var(--label-offset, 0px)), 0);
        transition: opacity 140ms ease, visibility 140ms ease;
        pointer-events: none;
    }

    .policy-marker:hover .policy-marker-name,
    .policy-marker:focus-visible .policy-marker-name,
    .policy-marker.is-hover .policy-marker-name {
        opacity: 1;
        visibility: visible;
    }

    .policy-marker-date {
        display: none;
        clear: both;
        padding-top: 8px;
        color: var(--muted);
        font-size: 10px;
    }

    svg {
        display: block;
        background: #fff;
    }

    /* The image timeline replaces the old compact policy labels above the SVG. */
    .secondary-policy-bar,
    .secondary-policy-label,
    .baseline-policy-bar,
    .baseline-policy-start,
    .baseline-policy-end,
    .baseline-policy-label,
    .legal-policy-line,
    .legal-policy-marker,
    .legal-policy-label,
    .policy-label,
    .policy-layer-label {
        display: none;
    }

    .tooltip {
        position: absolute;
        z-index: 10;
        max-width: 310px;
        padding: 10px 12px;
        pointer-events: none;
        color: #273044;
        background: rgba(255, 255, 255, 0.97);
        border: 1px solid #cbd1da;
        border-radius: 7px;
        box-shadow: 0 5px 18px rgba(0, 0, 0, 0.13);
        font-size: 13px;
        line-height: 1.5;
        opacity: 0;
    }

    .policy-info {
        position: sticky;
        top: 18px;
        min-height: 520px;
        padding: 20px;
        overflow-y: auto;
    }

    .policy-info h2 {
        margin: 0 0 16px;
        font-size: 19px;
    }

    .policy-placeholder {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
    }

    .policy-detail-cover {
        display: block;
        width: 132px;
        max-height: 178px;
        margin: 0 auto 16px;
        object-fit: cover;
        object-position: top;
        border: 1px solid var(--rule);
        border-radius: 5px;
        box-shadow: 0 5px 16px rgba(23, 32, 51, 0.12);
    }

    .policy-detail h3 {
        margin: 0 0 16px;
        color: #253047;
        font-size: 17px;
        line-height: 1.5;
    }

    .policy-meta {
        display: grid;
        gap: 12px;
        margin: 0;
    }

    .policy-meta-row {
        padding-bottom: 11px;
        border-bottom: 1px solid #edf0f4;
    }

    .policy-meta dt {
        margin-bottom: 5px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
    }

    .policy-meta dd {
        margin: 0;
        color: #374055;
        font-size: 13px;
        line-height: 1.65;
        white-space: pre-line;
    }

    .policy-link {
        display: inline-block;
        padding: 7px 13px;
        color: #fff;
        font-weight: 700;
        text-decoration: none;
        background: var(--accent);
        border-radius: 6px;
    }

    .policy-clickable {
        cursor: pointer;
    }

    .policy-clickable:hover,
    .policy-clickable:focus {
        filter: brightness(0.82);
        outline: none;
    }

    .policy-chart-line {
        stroke: #8b1e24;
        stroke-dasharray: 5 6;
        stroke-width: 1.1;
        opacity: 0.5;
        pointer-events: none;
    }

    .view-mode-toggle {
        position: fixed;
        right: 22px;
        bottom: 22px;
        z-index: 10000;
        display: inline-flex;
        gap: 4px;
        padding: 4px;
        border: 1px solid #d9dde5;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 8px 24px rgba(23, 32, 51, 0.14);
        backdrop-filter: blur(10px);
    }

    .view-mode-button {
        min-width: 54px;
        border: 0;
        border-radius: 6px;
        padding: 7px 11px;
        background: transparent;
        color: #596273;
        cursor: pointer;
        font-size: 13px;
        font-weight: 800;
    }

    .view-mode-button.active {
        background: var(--accent);
        color: #fff;
    }

    .site-footer {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        margin-top: 56px;
        padding-top: 18px;
        border-top: 1px solid var(--rule);
        color: var(--muted);
        font-size: 11px;
        letter-spacing: 0.06em;
        line-height: 1.7;
    }

    @media (max-width: 1100px) {
        .page {
            width: min(calc(100% - 22px), 1540px);
            padding: 20px 0 32px;
        }

        .controls {
            align-items: flex-start;
            flex-wrap: wrap;
        }

        .year-control {
            margin-left: 0;
        }

        #yearSlider {
            width: 230px;
        }

        .dashboard {
            grid-template-columns: 1fr;
        }

        .policy-info {
            position: static;
            height: auto !important;
            max-height: none;
            min-height: 0;
        }

        .site-footer {
            flex-direction: column;
            gap: 6px;
        }

    }
</style>
</head>

<body>
<div class="page">
    <section class="overview-hero-stats" aria-label="北京 PM2.5 治理成效摘要">
        <div class="overview-hero-caption">2013-&gt;2025 PM2.5年均下降</div>
        <div class="overview-hero-pct">−67%</div>
        <div class="overview-hero-change">
            <span>89.5<span class="overview-hero-value-unit">µg/m³</span></span><span class="overview-hero-arrow">→</span><span>29.4<span class="overview-hero-value-unit">µg/m³</span></span>
        </div>
        <p class="overview-hero-impact" id="overviewHeroImpact">
            按 <abbr title="AQLI（Air Quality Life Index, Univ. of Chicago）：每 1 µg/m³ PM₂.₅ 长期暴露对应约 0.098 年寿命差">AQLI</abbr>
            剂量-反应模型推算，相比维持 2013 年浓度水平，<b>北京居民人均预期寿命延长约 5.9 年</b>；
            同期年均空气质量优良天数从 <b>176 天升至 290 天（+114 天）</b>。
        </p>
    </section>

    <h1 id="chartTitle">2014-2026年北京市空气质量概览</h1>
    <div class="controls">
        <div class="control-group">
            <div class="control-title" id="pollutantsControlTitle">污染物：</div>
            <div class="checkboxes">
                <label><input type="checkbox" class="pollutant-checkbox" value="pm25" checked> PM2.5</label>
                <label><input type="checkbox" class="pollutant-checkbox" value="pm10"> PM10</label>
                <label><input type="checkbox" class="pollutant-checkbox" value="o3"> O3</label>
                <label><input type="checkbox" class="pollutant-checkbox" value="no2" checked> NO2</label>
                <label><input type="checkbox" class="pollutant-checkbox" value="so2" checked> SO2</label>
                <label><input type="checkbox" class="pollutant-checkbox" value="co"> CO</label>
            </div>
        </div>

        <div class="control-group year-control">
            <div class="control-title" id="yearControlTitle">年份：</div>
            <input type="range" id="yearSlider" min="0" max="13" step="1" value="0">
            <div id="yearLabel">全时段</div>
        </div>

    </div>

    <div class="dashboard full-view" id="dashboard">
        <section class="visualization-panel">
            <div class="chart-scroll" id="chartScroll">
                <div class="chart-canvas" id="chartCanvas">
                    <div class="policy-timeline" id="policyTimeline" aria-label="政策时间轴"></div>
                    <svg id="airQualityChart" width="1400" height="650" aria-label="日均空气质量指数图表"></svg>
                    <div class="tooltip"></div>
                </div>
            </div>
            <div class="chart-legend" aria-label="污染物图例">
                <span class="chart-legend-item"><i class="chart-legend-swatch" style="background:#1f77b4"></i>PM2.5</span>
                <span class="chart-legend-item"><i class="chart-legend-swatch" style="background:#ff7f0e"></i>PM10</span>
                <span class="chart-legend-item"><i class="chart-legend-swatch" style="background:#2ca02c"></i>O3</span>
                <span class="chart-legend-item"><i class="chart-legend-swatch" style="background:#d62728"></i>NO2</span>
                <span class="chart-legend-item"><i class="chart-legend-swatch" style="background:#9467bd"></i>SO2</span>
                <span class="chart-legend-item"><i class="chart-legend-swatch" style="background:#8c564b"></i>CO</span>
            </div>
        </section>

        <aside class="policy-info" id="policyInfo" aria-live="polite">
            <h2 id="policyInfoTitle">政策信息</h2>
            <div id="policyDetail">
                <p class="policy-placeholder">点击图表上方的政策封面或名称，可查看具体政策信息。</p>
            </div>
        </aside>
    </div>

    <div class="view-mode-toggle" aria-label="视图模式切换">
        <button id="fullViewButton" class="view-mode-button active" type="button">全屏</button>
        <button id="localViewButton" class="view-mode-button" type="button">局部</button>
    </div>

    <footer class="site-footer">
        <div class="left" id="footerCourse">清华大学 · 数据可视化课程</div>
        <div class="right">DATA · AQICN / 北京市环境保护监测中心 / CPCB / MEE / AQLI</div>
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="script.js"></script>
</body>
</html>
